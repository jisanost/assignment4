<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Job Application Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f3f4f6;
      color: #111;
      min-height: 100vh;
      padding: 32px 16px;
    }
    .container { max-width: 760px; margin: 0 auto; }

    h1 { font-size: 22px; font-weight: 700; margin-bottom: 24px; color: #111; }

    
    .dashboard {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 28px;
    }
    .dash-card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 18px 20px;
    }
    .dash-card .label { font-size: 12px; color: #6b7280; margin-bottom: 6px; }
    .dash-card .count { font-size: 32px; font-weight: 700; line-height: 1; }
    .dash-card.total .count { color: #111; }
    .dash-card.interview .count { color: #22c55e; }
    .dash-card.rejected .count { color: #ef4444; }

 
    .section {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 20px 22px;
    }
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .section-header h2 { font-size: 15px; font-weight: 600; }
    .section-header span { font-size: 13px; color: #6b7280; }

    .tabs {
      display: flex;
      gap: 4px;
      background: #f3f4f6;
      border-radius: 8px;
      padding: 4px;
      width: fit-content;
      margin-bottom: 20px;
    }
    .tab-btn {
      padding: 6px 18px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      background: transparent;
      color: #6b7280;
      transition: background 0.15s, color 0.15s;
    }
    .tab-btn.active { background: #3b82f6; color: #fff; }
        
    .cards-container { display: flex; flex-direction: column; gap: 14px; }

    .job-card {
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 16px 18px;
      transition: box-shadow 0.15s;
    }
    .job-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.07); }

    .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
    .card-info { flex: 1; min-width: 0; }
    .card-info .company { font-size: 14px; font-weight: 600; color: #111; }
    .card-info .position { font-size: 12px; color: #6b7280; margin-top: 2px; }
    .card-info .meta { font-size: 11px; color: #9ca3af; margin-top: 4px; }

    .status-badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.04em;
      padding: 3px 10px;
      border-radius: 999px;
      margin-top: 8px;
      margin-bottom: 8px;
    }
    .badge-not-applied { background: #f3f4f6; color: #6b7280; }
    .badge-interview { background: #dbeafe; color: #2563eb; }
    .badge-rejected { background: #fee2e2; color: #dc2626; }

    .card-desc { font-size: 12px; color: #6b7280; line-height: 1.6; margin-bottom: 12px; }

    .card-actions { display: flex; gap: 8px; flex-wrap: wrap; }

    .btn-interview {
      padding: 5px 16px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      border: 1.5px solid #3b82f6;
      background: transparent;
      color: #3b82f6;
      transition: background 0.15s, color 0.15s;
    }
    .btn-interview:hover, .btn-interview.active {
      background: #3b82f6;
      color: #fff;
    }
    .btn-rejected {
      padding: 5px 16px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      border: 1.5px solid #ef4444;
      background: transparent;
      color: #ef4444;
      transition: background 0.15s, color 0.15s;
    }
    .btn-rejected:hover, .btn-rejected.active {
      background: #ef4444;
      color: #fff;
    }

    .btn-delete {
      background: none;
      border: none;
      cursor: pointer;
      color: #9ca3af;
      padding: 4px;
      border-radius: 6px;
      flex-shrink: 0;
      transition: color 0.15s, background 0.15s;
      line-height: 1;
    }
    .btn-delete:hover { color: #ef4444; background: #fee2e2; }

    .empty-state {
      text-align: center;
      padding: 52px 20px;
    }
    .empty-state svg { margin: 0 auto 16px; display: block; color: #d1d5db; }
    .empty-state h3 { font-size: 15px; font-weight: 600; color: #9ca3af; margin-bottom: 6px; }
    .empty-state p { font-size: 13px; color: #b0b7c3; }

    @media (max-width: 500px) {
      .dashboard { grid-template-columns: repeat(3, 1fr); gap: 8px; }
      .dash-card { padding: 12px 10px; }
      .dash-card .count { font-size: 24px; }
      .section { padding: 14px 12px; }
      .tab-btn { padding: 5px 10px; font-size: 12px; }
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Job Application Tracker</h1>

  <div class="dashboard">
    <div class="dash-card total">
      <div class="label">Total</div>
      <div class="count" id="count-total">0</div>
    </div>
    <div class="dash-card interview">
      <div class="label">Interview</div>
      <div class="count" id="count-interview">0</div>
    </div>
    <div class="dash-card rejected">
      <div class="label">Rejected</div>
      <div class="count" id="count-rejected">0</div>
    </div>
  </div>

  <div class="section">
    <div class="section-header">
      <h2>Available Jobs</h2>
      <span id="jobs-count-label">0 Jobs</span>
    </div>

    
    <div class="tabs">
      <button class="tab-btn active" data-tab="all">All</button>
      <button class="tab-btn" data-tab="interview">Interview</button>
      <button class="tab-btn" data-tab="rejected">Rejected</button>
    </div>

    
    <div class="cards-container" id="cards-container"></div>
  </div>
</div>

<script>
  const jobs = [
    {
      id: 1, status: "not-applied",
      companyName: "Mobile First Corp",
      position: "React Native Developer",
      location: "Remote", type: "Full-time", salary: "$120,000 – $170,000",
      description: "Build cross-platform mobile applications using React Native. Work on products used by millions of users worldwide."
    },
    {
      id: 2, status: "not-applied",
      companyName: "WebFlow Agency",
      position: "Web Designer & Developer",
      location: "Los Angeles, CA", type: "Part-time", salary: "$80,000 – $120,000",
      description: "Create stunning web experiences for high-profile clients. Must have portfolio and experience with modern web design tools."
    },
    {
      id: 3, status: "not-applied",
      companyName: "DataViz Solutions",
      position: "Data Visualization Specialist",
      location: "Boston, MA", type: "Full-time", salary: "$115,000 – $165,000",
      description: "Transform complex data into compelling visualizations. Required skills: D3.js, React, and strong analytical thinking."
    },
    {
      id: 4, status: "not-applied",
      companyName: "CloudFirst Inc",
      position: "Backend Developer",
      location: "Seattle, WA", type: "Full-time", salary: "$140,000 – $190,000",
      description: "Design and maintain scalable backend services using Python and AWS. Work with modern DevOps practices and cloud infrastructure."
    },
    {
      id: 5, status: "not-applied",
      companyName: "Innovation Labs",
      position: "UI/UX Engineer",
      location: "Austin, TX", type: "Full-time", salary: "$105,000 – $150,000",
      description: "Create beautiful and functional user interfaces for our suite of products. Strong design skills and frontend development expertise required."
    },
    {
      id: 6, status: "not-applied",
      companyName: "MegaCorp Solutions",
      position: "JavaScript Developer",
      location: "New York, NY", type: "Full-time", salary: "$130,000 – $175,000",
      description: "Build enterprise applications with JavaScript and modern frameworks. We offer competitive compensation, health insurance, and professional development opportunities."
    },
    {
      id: 7, status: "not-applied",
      companyName: "StartupXYZ",
      position: "Full Stack Engineer",
      location: "Remote", type: "Full-time", salary: "$100,000 – $145,000",
      description: "Join our fast-growing startup and work on our core platform. Experience with Node.js and React required. Great benefits and equity package included."
    },
    {
      id: 8, status: "not-applied",
      companyName: "TechCore Industries",
      position: "Senior Frontend Developer",
      location: "San Francisco, CA", type: "Full-time", salary: "$150,000 – $210,000",
      description: "We are looking for an experienced frontend developer to build scalable web applications using React and TypeScript. You will work with a talented team on cutting-edge projects."
    }
  ];

  let currentTab = "all";


  const container     = document.getElementById("cards-container");
  const countTotal    = document.getElementById("count-total");
  const countInterview= document.getElementById("count-interview");
  const countRejected = document.getElementById("count-rejected");
  const jobsCountLabel= document.getElementById("jobs-count-label");
  const tabBtns       = document.querySelectorAll(".tab-btn");


  tabBtns.forEach(btn => {
    btn.addEventListener("click", () => {
      currentTab = btn.dataset.tab;
      tabBtns.forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      render();
    });
  });

  function updateCounts() {
    const interviewCount = jobs.filter(j => j.status === "interview").length;
    const rejectedCount  = jobs.filter(j => j.status === "rejected").length;
    countTotal.textContent    = jobs.length;
    countInterview.textContent= interviewCount;
    countRejected.textContent = rejectedCount;
  }

  function createCard(job) {
    const card = document.createElement("div");
    card.className = "job-card";
    card.dataset.id = job.id;

   
    const top = document.createElement("div");
    top.className = "card-top";

    const info = document.createElement("div");
    info.className = "card-info";

    const company = document.createElement("div");
    company.className = "company";
    company.textContent = job.companyName;

    const position = document.createElement("div");
    position.className = "position";
    position.textContent = job.position;

    const meta = document.createElement("div");
    meta.className = "meta";
    meta.textContent = `${job.location}  •  ${job.type}  •  ${job.salary}`;

    const badge = document.createElement("div");
    badge.className = "status-badge";
    setBadge(badge, job.status);

    const desc = document.createElement("div");
    desc.className = "card-desc";
    desc.textContent = job.description;

    info.appendChild(company);
    info.appendChild(position);
    info.appendChild(meta);
    info.appendChild(badge);
    info.appendChild(desc);

  
    const delBtn = document.createElement("button");
    delBtn.className = "btn-delete";
    delBtn.title = "Delete";
    delBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>`;

    delBtn.addEventListener("click", () => {
      const idx = jobs.findIndex(j => j.id === job.id);
      if (idx !== -1) jobs.splice(idx, 1);
      updateCounts();
      render();
    });

    top.appendChild(info);
    top.appendChild(delBtn);

    const actions = document.createElement("div");
    actions.className = "card-actions";

    const btnI = document.createElement("button");
    btnI.className = "btn-interview" + (job.status === "interview" ? " active" : "");
    btnI.textContent = "INTERVIEW";

    const btnR = document.createElement("button");
    btnR.className = "btn-rejected" + (job.status === "rejected" ? " active" : "");
    btnR.textContent = "REJECTED";

    btnI.addEventListener("click", () => {
      job.status = job.status === "interview" ? "not-applied" : "interview";
      updateCounts();
      // if on a filtered tab, re-render; else just update this card in place
      if (currentTab !== "all") {
        render();
      } else {
        setBadge(badge, job.status);
        btnI.className = "btn-interview" + (job.status === "interview" ? " active" : "");
        btnR.className = "btn-rejected" + (job.status === "rejected" ? " active" : "");
      }
    });

    btnR.addEventListener("click", () => {
      job.status = job.status === "rejected" ? "not-applied" : "rejected";
      updateCounts();
      if (currentTab !== "all") {
        render();
      } else {
        setBadge(badge, job.status);
        btnI.className = "btn-interview" + (job.status === "interview" ? " active" : "");
        btnR.className = "btn-rejected" + (job.status === "rejected" ? " active" : "");
      }
    });

    actions.appendChild(btnI);
    actions.appendChild(btnR);

    card.appendChild(top);
    card.appendChild(actions);

    return card;
  }

  function setBadge(el, status) {
    el.className = "status-badge";
    if (status === "interview") {
      el.classList.add("badge-interview");
      el.textContent = "INTERVIEW";
    } else if (status === "rejected") {
      el.classList.add("badge-rejected");
      el.textContent = "REJECTED";
    } else {
      el.classList.add("badge-not-applied");
      el.textContent = "NOT APPLIED";
    }
  }


  function emptyState(message, subtitle) {
    const div = document.createElement("div");
    div.className = "empty-state";
    div.innerHTML = `
      <svg width="64" height="64" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.4"
          d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
      </svg>
      <h3>${message}</h3>
      <p>${subtitle}</p>
    `;
    return div;
  }

  function render() {

    while (container.firstChild) container.removeChild(container.firstChild);

    const filtered = currentTab === "all"
      ? jobs
      : jobs.filter(j => j.status === currentTab);

    jobsCountLabel.textContent = jobs.length + " Jobs";


    const iCount = jobs.filter(j => j.status === "interview").length;
    const rCount = jobs.filter(j => j.status === "rejected").length;
    tabBtns.forEach(btn => {
      if (btn.dataset.tab === "interview") btn.textContent = iCount > 0 ? `Interview (${iCount})` : "Interview";
      if (btn.dataset.tab === "rejected")  btn.textContent = rCount > 0 ? `Rejected (${rCount})` : "Rejected";
      if (btn.dataset.tab === "all")       btn.textContent = "All";
    });

    if (filtered.length === 0) {
      const msg = currentTab === "interview"
        ? ["No Jobs Available", "No applications have been marked for interview yet."]
        : currentTab === "rejected"
        ? ["No Jobs Available", "No applications have been rejected yet."]
        : ["No Jobs Available", "All jobs have been removed."];
      container.appendChild(emptyState(msg[0], msg[1]));
      return;
    }

    filtered.forEach(job => container.appendChild(createCard(job)));
  }

  updateCounts();
  render();
</script>
</body>
</html>
